spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=kn0xkn0x

spring.ai.openai.api-key=${OPENAI_API_KEY:disabled}
spring.ai.anthropic.api-key=${CLAUDE_API_KEY:disabled}
spring.ai.google.genai.api-key=${GEMINI_API_KEY:disabled}
spring.ai.model.chat=google-genai
spring.ai.anthropic.chat.options.model=claude-3-haiku-20240307
spring.ai.openai.chat.options.model=gpt-3.5-turbo
spring.ai.openai.chat.options.presencePenalty=0.5
spring.ai.openai.chat.options.parallel-tool-calls=false
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# MCP client — connects Knox to MCPGeneBank's MCP server over SSE.
# Default assumes `python mcp_server.py --sse` is running on the host.
# From inside docker, host.docker.internal resolves to the host.
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.name=knox-mcp-client
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.toolcallback.enabled=true
# Defer server connection until the first tool call — Knox must boot even when
# MCPGeneBank is not yet running. Tool discovery happens lazily.
spring.ai.mcp.client.initialized=false
spring.ai.mcp.client.request-timeout=120s
spring.ai.mcp.client.sse.connections.mcpgenebank.url=${MCPGENEBANK_URL:http://host.docker.internal:8000}

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

server.max-http-request-header-size=10MB

logging.level.org.springframework.data.neo4j=ERROR
logging.level.org.neo4j.driver=ERROR
logging.level.org.neo4j.ogm=ERROR
logging.level.org.neo4j=ERROR

#debug=true

services:
  neo4j:
    image: neo4j:2025.07.1
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/kn0xkn0x
    ports:
      - "127.0.0.1:7474:7474"   # Localhost only
      - "127.0.0.1:7687:7687"   # Localhost only
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "kn0xkn0x", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - knox

  backend:
    build: .
    container_name: knox-backend
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: kn0xkn0x

      # Spring AI providers
      OPENAI_API_KEY: ${OPENAI_API_KEY:-disabled}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-disabled}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-disabled}

      # NVIDIA BioNeMo NIM — Evo 2 40B generative fill (see issue #26)
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-disabled}

      # MCP client — point Knox at the host's MCPGeneBank SSE server.
      # MCPGeneBank is run manually on the host (see CLAUDE.md).
      MCPGENEBANK_URL: ${MCPGENEBANK_URL:-http://host.docker.internal:8000}

    # Make host.docker.internal resolvable on Linux/WSL (Docker Desktop handles it natively).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "127.0.0.1:8080:8080"   # Localhost only
    networks:
      - knox

volumes:
  neo4j_data:

networks:
  knox:

